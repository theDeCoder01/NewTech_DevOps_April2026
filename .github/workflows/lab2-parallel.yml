name: Lab 2 - Parallel Solution (Advanced)

# on:
#   workflow_dispatch   # disabled — enable after teaching parallel concepts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  

# ─────────────────────────────────────────────────────────────────────────────
# The one change from the sequential version:
#
#   test-lab2:
#     needs: test-lab1   →   needs: lint
#
# Both test jobs now share the same upstream dependency (lint), so GitHub
# starts them on separate runners at the same time.
#
# EXECUTION ORDER:
#
#   [lint]
#     ↓         ↓
#   [test-lab1] [test-lab2]   ← start simultaneously on two separate runners
#         ↓         ↓
#          [summary]           ← fan-in: waits for both to finish
#
# Total time = lint + slowest test job  (NOT the sum)
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── STAGE 1 ────────────────────────────────────────────────────────────────
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install flake8

      - name: Lint Lab 1
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        working-directory: './GH_Actions/lab1'
        continue-on-error: true

      - name: Lint Lab 2
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        working-directory: './GH_Actions/lab2'
        continue-on-error: true

  # ── STAGE 2 — both jobs start simultaneously ────────────────────────────────
  test-lab1:
    name: Test Lab 1 — Calculator
    runs-on: ubuntu-latest
    needs: lint          # waits only for lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        working-directory: './GH_Actions/lab1'

      - name: Run Lab 1 tests
        run: pytest test_calculator.py -v --cov=calculator --cov-report=term-missing
        working-directory: './GH_Actions/lab1'

      - name: Upload Lab 1 coverage report
        uses: actions/upload-artifact@v4
        with:
          name: lab1-coverage
          path: ./GH_Actions/lab1/coverage.xml

  # KEY DIFFERENCE from sequential version:
  #   Sequential → needs: test-lab1   (waits for Lab 1 to finish)
  #   Parallel   → needs: lint        (only waits for lint, starts alongside test-lab1)
  test-lab2:
    name: Test Lab 2 — String Utils
    runs-on: ubuntu-latest
    needs: lint          # only waits for lint → runs alongside test-lab1

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        working-directory: './GH_Actions/lab2'

      - name: Run Lab 2 tests
        run: pytest test_string_utils.py -v --cov=string_utils --cov-report=term-missing
        working-directory: './GH_Actions/lab2'

      - name: Upload Lab 2 coverage report
        uses: actions/upload-artifact@v4
        with:
          name: lab2-coverage
          path: ./GH_Actions/lab2/coverage.xml

  # ── STAGE 3 — fan-in ────────────────────────────────────────────────────────
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-lab1, test-lab2]   # waits for BOTH parallel jobs
    if: always()

    steps:
      - name: Print results
        run: |
          echo "========================================================"
          echo "  Lab 2 — Parallel Run Results"
          echo "========================================================"
          echo "  Lab 1  : ${{ needs.test-lab1.result }}"
          echo "  Lab 2  : ${{ needs.test-lab2.result }}"
          echo "========================================================"
          echo ""
          echo "  test-lab1 and test-lab2 ran at the same time."
          echo "  Total time = lint + slowest test job"
          echo "========================================================"
