name: LAB3_CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write #to give the workflow permission to commit and push changes back to the repository. not needed right now.

jobs:
  Test-Validator:
    strategy: #to use the same workflow to test in multiple Python versions and the usage of variables.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]
        working-directory: ["./GH_Actions/lab3"]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: ${{ matrix.working-directory }}

      - name: Auto-format with Black
        run: |
          pip install black
          black .
        working-directory: ${{ matrix.working-directory }}

      # - name: Commit and Push formatting fixes #to automatically commit and push any formatting fixes made by Black.
      #   uses: stefanzweifel/git-auto-commit-action@v5
      #   with:
      #     commit_message: "chore: automated format fixes via Black"
      #     branch: main
      - name: lint with flake8
        run: |
          pip install flake8
          flake8 . --format='::warning file=%(path)s,line=%(row)d,col=%(col)d::[Flake8] %(code)s: %(text)s' --exit-zero
        working-directory: ${{ matrix.working-directory }}
        #force flake 8 to code 0 while still echoing the errors.

      - name: Run validator tests
        run: |
          pip install pytest pytest-cov
          python -m pytest test_validator.py --cov=test_validator --cov-report=term-missing --cov-report=xml:coverage_validator.xml
        working-directory: ${{ matrix.working-directory }}

      - name: UploadSave coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: lab3-coverage-validator-report
          path: ./GH_Actions/lab3/coverage_validator.xml
          #Save the XML Report

  Test-Transformer:
    strategy: #to use the same workflow to test in multiple Python versions and the usage of variables.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]
        working-directory: ["./GH_Actions/lab3"]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: ${{ matrix.working-directory }}

      - name: Auto-format with Black
        run: |
          pip install black
          black .
        working-directory: ${{ matrix.working-directory }}

      # - name: Commit and Push formatting fixes #to automatically commit and push any formatting fixes made by Black.
      #   uses: stefanzweifel/git-auto-commit-action@v5
      #   with:
      #     commit_message: "chore: automated format fixes via Black"
      #     branch: main
      - name: lint with flake8
        run: |
          pip install flake8
          flake8 . --format='::warning file=%(path)s,line=%(row)d,col=%(col)d::[Flake8] %(code)s: %(text)s' --exit-zero
        working-directory: ${{ matrix.working-directory }}
        #force flake 8 to code 0 while still echoing the errors.

      - name: Run transformer tests
        run: |
          pip install pytest pytest-cov
          python -m pytest test_transformer.py --cov=test_transformer --cov-report=term-missing --cov-report=xml:coverage_transformer.xml
        working-directory: ${{ matrix.working-directory }}

      - name: Save coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: lab3-coverage-transformer-report
          path: ./GH_Actions/lab3/coverage_transformer.xml
          #Save the XML Report

  Test-Reporter:
    strategy: #to use the same workflow to test in multiple Python versions and the usage of variables.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]
        working-directory: ["./GH_Actions/lab3"]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: ${{ matrix.working-directory }}

      - name: Auto-format with Black
        run: |
          pip install black
          black .
        working-directory: ${{ matrix.working-directory }}

      # - name: Commit and Push formatting fixes #to automatically commit and push any formatting fixes made by Black.
      #   uses: stefanzweifel/git-auto-commit-action@v5
      #   with:
      #     commit_message: "chore: automated format fixes via Black"
      #     branch: main
      - name: lint with flake8
        run: |
          pip install flake8
          flake8 . --format='::warning file=%(path)s,line=%(row)d,col=%(col)d::[Flake8] %(code)s: %(text)s' --exit-zero
        working-directory: ${{ matrix.working-directory }}
        #force flake 8 to code 0 while still echoing the errors.

      - name: Run reporter tests
        run: |
          pip install pytest pytest-cov
          python -m pytest test_reporter.py --cov=test_reporter --cov-report=term-missing --cov-report=xml:coverage_reporter.xml
        working-directory: ${{ matrix.working-directory }}

      - name: Save coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: lab3-coverage-reporter-report
          path: ./GH_Actions/lab3/coverage_reporter.xml
          #Save the XML Report

  Fan-in: #report test status
    runs-on: ubuntu-latest
    needs: [Test-Validator, Test-Transformer, Test-Reporter]
    if: always() #to run the rest of the test if one fails.
    steps:
      - name: Print job Status
        run: |
          echo "Validator Status:   ${{ needs.test-validator.result }}"
          echo "Transformer Status: ${{ needs.test-transformer.result }}"
          echo "Reporter Status:    ${{ needs.test-reporter.result }}"

  Security-Scan:
    runs-on: ubuntu-latest
    if: always() #to run the rest of the test if one fails.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run security scan with Bandit
        run: |
          pip install bandit
          bandit -r . --format=xml --output=bandit_report.xml
        working-directory: ${{ matrix.working-directory }}

      - name: Save Bandit report artifact
        uses: actions/upload-artifact@v4
        with:
          name: lab3-bandit-report
          path: ./GH_Actions/lab3/bandit_report.xml
          #Save the XML Report
