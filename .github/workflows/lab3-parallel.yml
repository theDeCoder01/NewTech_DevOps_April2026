name: Lab 3 - Parallel Jobs (Data Pipeline)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ─────────────────────────────────────────────────────────────────────────────
# EXECUTION ORDER
#
#  STAGE 1 — all three test jobs start simultaneously (no 'needs' between them)
#            each job runs a matrix of 3 Python versions (3.11, 3.10, 3.9)
#
#    [test-validator (3.11/3.10/3.9)]
#    [test-transformer (3.11/3.10/3.9)]
#    [test-reporter (3.11/3.10/3.9)]
#
#  STAGE 2 — fan-in: summary waits for all three jobs (all matrix runs) to finish
#
#                      [pipeline-summary]
#
# Total time ≈ time for the slowest single test job matrix run (not the sum)
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── JOB 1 ──────────────────────────────────────────────────────────────────
  # No 'needs:' → starts immediately when the workflow is triggered
  # Matrix runs 3 Python versions in parallel
  test-validator:
    name: Test Validator Module (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11', '3.10', '3.9']

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: './GH_Actions/lab3'

      - name: Run validator tests
        run: pytest test_validator.py -v --cov=validator --cov-report=term-missing
        working-directory: './GH_Actions/lab3'

  # ── JOB 2 ──────────────────────────────────────────────────────────────────
  # No 'needs:' → also starts immediately, runs alongside test-validator
  # Matrix runs 3 Python versions in parallel
  test-transformer:
    name: Test Transformer Module (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11', '3.10', '3.9']

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: './GH_Actions/lab3'

      - name: Run transformer tests
        run: pytest test_transformer.py -v --cov=transformer --cov-report=term-missing
        working-directory: './GH_Actions/lab3'

  # ── JOB 3 ──────────────────────────────────────────────────────────────────
  # No 'needs:' → also starts immediately, runs alongside the other two
  # Matrix runs 3 Python versions in parallel
  test-reporter:
    name: Test Reporter Module (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11', '3.10', '3.9']

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: './GH_Actions/lab3'

      - name: Run reporter tests
        run: pytest test_reporter.py -v --cov=reporter --cov-report=term-missing
        working-directory: './GH_Actions/lab3'

  # ── JOB 4 — FAN-IN ─────────────────────────────────────────────────────────
  # 'needs' lists all three parallel jobs → this job waits for all of them
  # 'if: always()' ensures this runs even if one of the test jobs failed
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test-validator, test-transformer, test-reporter]
    if: always()

    steps:
      - name: Print results of all parallel jobs
        run: |
          echo "========================================================"
          echo "  Lab 3 — Data Pipeline CI Results"
          echo "========================================================"
          echo "  Validator   : ${{ needs.test-validator.result }}"
          echo "  Transformer : ${{ needs.test-transformer.result }}"
          echo "  Reporter    : ${{ needs.test-reporter.result }}"
          echo "========================================================"

      - name: Fail if any test job failed
        if: |
          needs.test-validator.result   != 'success' ||
          needs.test-transformer.result != 'success' ||
          needs.test-reporter.result    != 'success'
        run: |
          echo "One or more test jobs failed."
          exit 1
